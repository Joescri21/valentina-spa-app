

<section class="bg-white" id="Servicios">

  <h2 class="text-4xl font-bold text-pink-500 text-center mt-2 mb-4">
    Nuestros servicios
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 p-4">
    <div *ngFor="let servicio of servicios" class="group bg-base-100 rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300">
      <div class="relative overflow-hidden">
        <img [src]="servicio.imagen" class="w-full h-48 object-cover group-hover:scale-110 transition-transform duration-500" />
        <div class="absolute top-2 right-2 badge badge-rose-700 font-bold">${{ servicio.precio }}</div>
      </div>

      <div class="p-5">
        <h3 class="text-lg font-bold text-pink-500">{{ servicio.nombre }}</h3>
        <p class="text-xs text-gray-500 mt-1 italic">{{ servicio.descripcion }}</p>

        <div class="flex justify-between items-center mt-4">
          <span class="flex items-center gap-1 text-xs font-medium">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
            >
              <g
                fill="none"
                stroke="#f3ca4c"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              >
              <circle
              cx="12"
              cy="12"
              r="10"
              />
              <path
              d="M12 6v6l4 2"
              />
              </g>
            </svg>
            {{ servicio.duracion }} min
          </span>
          <button (click)="seleccionarServicio(servicio)" class="btn btn-primary btn-xs btn-outline">Reservar Cita</button>
        </div>
      </div>
    </div>
  </div>

</section>
