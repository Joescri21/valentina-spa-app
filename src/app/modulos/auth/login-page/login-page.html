
<section class="contain-content w-full flex flex-col items-center justify-center gap-4">
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mt-30">
    
    <!-- Mensaje de error -->
    <div *ngIf="errorMessage" class="alert alert-error mb-4">
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Email -->
    <fieldset class="fieldset">
      <label class="label">Email</label>
      <input 
        type="email" 
        formControlName="email" 
        class="input validator" 
        placeholder="admin@valentinaspa.com" 
      />
      <p class="validator-hint text-error text-sm mt-1" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        Email requerido y válido
      </p>
    </fieldset>

    <!-- Password -->
    <fieldset class="fieldset mt-4">
      <label class="label">Contraseña</label>
      <input 
        type="password" 
        formControlName="password" 
        class="input validator" 
        placeholder="Contraseña" 
      />
      <p class="validator-hint text-error text-sm mt-1" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        Contraseña requerida
      </p>
    </fieldset>

    <button 
      [disabled]="!loginForm.valid" 
      class="btn btn-neutral mt-4" 
      type="submit"
    >
      Login
    </button>
  </form>

  <button routerLink="/home" class="btn btn-link mt-8 text-pink-500"> Regresar </button>
</section>
