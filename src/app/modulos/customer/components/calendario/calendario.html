<section class="max-w-4xl mx-auto p-4">
  <h2 class="text-2xl font-bold text-pink-500 mb-6 text-center">Finaliza tu Reserva</h2>

  <div class="card lg:card-side bg-base-100 shadow-2xl overflow-hidden border border-base-200">

    <figure class="lg:w-1/3 bg-primary/10 flex flex-col items-center justify-center p-6 text-center">
      <img src="pedicure.jpg" alt="Promo" class="rounded-xl shadow-md mb-4 object-cover h-48 w-full" />
      <div class="badge badge-primary mb-2">Promoción Seleccionada</div>
      <h3 class="text-xl text-pink-500 font-bold">Facial Hidratante Deep</h3>
      <p class="text-sm opacity-70">Duración: 60 min</p>
      <p class="text-2xl font-black mt-4 text-pink-500">$450.00</p>
    </figure>

    <div class="card-body lg:w-2/3">
      <div class="form-control">
        <label class="label">
          <span class="label-text font-bold">1. Selecciona el día:</span>
        </label>
        <div class="flex justify-center p-2 bg-base-200/30">
          <calendar-date class="cally bg-base-100 border border-base-300 shadow-lg rounded-box">
            <svg aria-label="Previous" class="fill-current size-4" slot="previous" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="M15.75 19.5 8.25 12l7.5-7.5"></path></svg>
            <svg aria-label="Next" class="fill-current size-4" slot="next" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="m8.25 4.5 7.5 7.5-7.5 7.5"></path></svg>
            <calendar-month></calendar-month>
          </calendar-date>
        </div>
      </div>

      <div class="form-control mt-4">
        <label class="label">
          <span class="label-text font-bold">2. Elige la hora disponible:</span>
        </label>
        <div class="flex flex-wrap gap-2">
          <button class="btn btn-outline btn-sm hover:btn-primary">10:00 AM</button>
          <button class="btn btn-outline btn-sm hover:btn-primary">12:00 PM</button>
          <button class="btn btn-outline btn-sm hover:btn-primary">14:00 PM</button>
          <button class="btn btn-primary btn-sm">16:00 PM</button>
          <button class="btn btn-outline btn-sm hover:btn-primary">18:0 PM</button>

        </div>
      </div>

      <div class="card-actions justify-end mt-8">
        <button class="btn btn-ghost">Cancelar</button>
        <button class="btn btn-primary px-8">
          Confirmar Cita
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
        </button>
      </div>
    </div>
  </div>
</section>
